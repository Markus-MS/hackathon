{% extends "frontend_base.html" %}
{% set show_ctf_nav = true %}

{% block title %}CTFArena{% endblock %}

{% block content %}
  <section>
    <p class="eyebrow">Details</p>
    <h1 id="title">Details</h1>
    <p class="subtitle" id="summary">Loading active CTF metadata...</p>
    <div class="meta" id="meta"></div>
    <div id="challenge-overview" class="challenge-overview-grid" hidden></div>
    <section id="terminal-grid" class="terminal-grid" hidden></section>
  </section>
{% endblock %}

{% block scripts %}
  <script>
    const challengeApiUrl = {{ challenge_api_url|tojson }};
    const detailsApiUrl = {{ details_api_url|tojson }};
    const rerunBaseUrl = {{ url_for('admin.rerun_challenge_run', challenge_run_id=0)|tojson }};
    const terminalControllers = new Map();
    const terminalDoneStatuses = new Set(["solved", "failed", "timed_out", "crashed", "budget_exhausted"]);

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function addMeta(label, value) {
      const meta = document.getElementById("meta");
      const card = document.createElement("div");
      card.className = "meta-card";
      card.textContent = `${label}: ${value}`;
      meta.appendChild(card);
    }

    function seconds(value) {
      if (value == null) return "n/a";
      return `${Number(value).toFixed(1)}s`;
    }

    function ctfUrl(ctfId) {
      return `/ctfs/${encodeURIComponent(ctfId)}`;
    }

    function renderCtfNav(data) {
      const nav = document.getElementById("ctf-nav-buttons");
      if (!nav) return;
      nav.replaceChildren();

      const currentId = data.ctf ? Number(data.ctf.id) : null;
      const seen = new Set();
      const entries = [];

      for (const item of (data.recent_ctfs || [])) {
        const id = Number(item.id);
        if (Number.isNaN(id) || seen.has(id)) continue;
        entries.push({ id, title: item.title });
        seen.add(id);
      }

      if (data.ctf && data.ctf.id != null && !seen.has(Number(data.ctf.id))) {
        entries.push({ id: Number(data.ctf.id), title: data.ctf.title });
      }

      for (const entry of entries) {
        const link = document.createElement("a");
        link.className = "ctf-switch-btn";
        link.textContent = entry.title;
        link.href = ctfUrl(entry.id);
        if (currentId != null && entry.id === currentId) {
          link.classList.add("is-active");
          link.setAttribute("aria-current", "page");
        }
        nav.appendChild(link);
      }
    }

    function terminalKey(row) {
      return String(row.challenge_run_id || row.slug || row.model);
    }

    function isTerminalDone(status) {
      return terminalDoneStatuses.has(String(status || ""));
    }

    function renderChallengeOverview(data) {
      const wrap = document.getElementById("challenge-overview");
      wrap.replaceChildren();
      wrap.hidden = false;

      const total = data.models.length;
      const solved = data.models.filter((item) => item.status === "solved").length;
      const trying = data.models.filter((item) => item.status === "running").length;

      const cards = [
        ["CTF", data.ctf?.title || "unknown"],
        ["Category", data.challenge?.category || "n/a"],
        ["Points", data.challenge?.points ?? "n/a"],
        ["Solved Models", `${solved}/${total}`],
        ["Active Models", trying],
      ];

      for (const [label, value] of cards) {
        const card = document.createElement("article");
        card.className = "challenge-overview-card";
        const labelEl = document.createElement("span");
        labelEl.textContent = label;
        const valueEl = document.createElement("strong");
        valueEl.textContent = String(value);
        card.append(labelEl, valueEl);
        wrap.appendChild(card);
      }
    }

    async function rerunChallenge(challengeRunId, btn) {
      const url = rerunBaseUrl.replace("/0/", `/${challengeRunId}/`);
      btn.disabled = true;
      btn.textContent = "Queuing…";
      try {
        const resp = await fetch(url, { method: "POST" });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          btn.textContent = body.error || "Error";
          btn.disabled = false;
          return;
        }
        btn.textContent = "Queued";
        setTimeout(() => loadChallengeDetails().catch(() => {}), 800);
      } catch (e) {
        btn.textContent = "Failed";
        btn.disabled = false;
      }
    }

    function createActivityController(row, pane, streamState) {
      let current = row;
      let lastEventId = 0;
      let eventSource = null;
      let pollTimer = null;
      let hasRenderedEvents = false;
      let destroyed = false;

      function setStreamState(label, tone = "idle") {
        if (!streamState) return;
        streamState.textContent = label;
        streamState.dataset.state = tone;
      }

      function scrollToBottom() {
        pane.scrollTop = pane.scrollHeight;
      }

      function setPlaceholder(text) {
        if (hasRenderedEvents) return;
        pane.replaceChildren();
        const line = document.createElement("div");
        line.className = "terminal-line terminal-line-placeholder";
        line.textContent = text || "Waiting for terminal activity…";
        pane.appendChild(line);
        scrollToBottom();
      }

      function clearPane() {
        hasRenderedEvents = false;
        lastEventId = 0;
        pane.replaceChildren();
      }

      function appendEvent(event) {
        if (!event?.content) return;
        if (!hasRenderedEvents) {
          pane.replaceChildren();
          hasRenderedEvents = true;
        }
        const line = document.createElement("div");
        line.className = `terminal-line terminal-line-${event.kind || "note"}`;
        line.textContent = event.content;
        pane.appendChild(line);
        lastEventId = Math.max(lastEventId, Number(event.id || 0));
        scrollToBottom();
      }

      function stopStreaming() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function fetchActivity({ reset = false } = {}) {
        if (!current.activity_api_url || destroyed) return;
        const after = reset ? 0 : lastEventId;
        const response = await fetch(`${current.activity_api_url}?after=${after}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load activity");
        }
        const payload = await response.json();
        if (reset) {
          clearPane();
        }
        for (const event of payload.events || []) {
          appendEvent(event);
        }
        if (!hasRenderedEvents) {
          setPlaceholder(current.terminal_text || "Waiting for terminal activity…");
        }
        if (payload.done) {
          setStreamState("Done", "done");
          stopStreaming();
        }
        return payload;
      }

      function ensurePolling() {
        if (pollTimer || destroyed || isTerminalDone(current.status)) return;
        setStreamState("Polling", "live");
        pollTimer = window.setInterval(() => {
          fetchActivity().catch(() => {});
        }, 1500);
      }

      function connectStream() {
        if (!current.activity_stream_url || destroyed || isTerminalDone(current.status)) {
          return;
        }
        if (typeof EventSource === "undefined") {
          ensurePolling();
          return;
        }
        stopStreaming();
        setStreamState("Live", "live");
        eventSource = new EventSource(`${current.activity_stream_url}?after=${lastEventId}`);
        eventSource.onmessage = (message) => {
          let payload;
          try {
            payload = JSON.parse(message.data);
          } catch {
            return;
          }
          for (const event of payload.events || []) {
            appendEvent(event);
          }
          if (!hasRenderedEvents) {
            setPlaceholder(current.terminal_text || "Waiting for terminal activity…");
          }
          if (payload.done) {
            setStreamState("Done", "done");
            stopStreaming();
          }
        };
        eventSource.onerror = () => {
          if (eventSource) {
            eventSource.close();
            eventSource = null;
          }
          if (!isTerminalDone(current.status)) {
            ensurePolling();
          }
        };
      }

      async function bootstrap() {
        setPlaceholder(current.terminal_text || "Waiting for terminal activity…");
        if (!current.activity_api_url) {
          setStreamState("Static", "idle");
          return;
        }
        try {
          const payload = await fetchActivity({ reset: true });
          if (!payload?.done) {
            connectStream();
          }
        } catch {
          ensurePolling();
        }
      }

      function update(row) {
        const wasDone = isTerminalDone(current.status);
        current = row;
        const nowDone = isTerminalDone(current.status);

        if (wasDone && !nowDone) {
          stopStreaming();
          clearPane();
          setPlaceholder(current.terminal_text || "Queued…");
          bootstrap().catch(() => {});
          return;
        }

        if (!hasRenderedEvents) {
          setPlaceholder(current.terminal_text || "Waiting for terminal activity…");
        }
        if (nowDone) {
          fetchActivity().catch(() => {});
          setStreamState("Done", "done");
          stopStreaming();
        } else if (!eventSource && !pollTimer) {
          connectStream();
        }
      }

      function destroy() {
        destroyed = true;
        stopStreaming();
      }

      bootstrap().catch(() => {
        ensurePolling();
      });

      return { update, destroy };
    }

    function createTerminalCard(row) {
      const card = document.createElement("article");
      card.className = "terminal-card";

      const head = document.createElement("header");
      head.className = "terminal-head";

      const model = document.createElement("span");
      model.className = "terminal-model";
      const dot = document.createElement("span");
      dot.className = `dot status-${row.kind || "idle"}`;
      if (row.color) dot.style.background = row.color;
      const name = document.createElement("strong");
      name.textContent = row.model;
      model.append(dot, name);

      const right = document.createElement("div");
      right.className = "terminal-head-actions";

      const streamState = null;

      const status = document.createElement("span");
      status.className = `pill pill-${row.status}`;
      status.textContent = String(row.label || row.status).replaceAll("_", " ");
      right.appendChild(status);

      let rerunBtn = null;
      function syncRerunButton(nextRow) {
        if (nextRow.challenge_run_id) {
          if (!rerunBtn) {
            rerunBtn = document.createElement("button");
            rerunBtn.className = "rerun-btn";
            right.appendChild(rerunBtn);
          }
          const isActive = ["running", "queued"].includes(nextRow.status);
          rerunBtn.disabled = isActive;
          rerunBtn.textContent = isActive ? "Running" : "Rerun";
          rerunBtn.title = `Rerun challenge for ${nextRow.model}`;
          rerunBtn.onclick = isActive ? null : () => rerunChallenge(nextRow.challenge_run_id, rerunBtn);
        } else if (rerunBtn) {
          rerunBtn.remove();
          rerunBtn = null;
        }
      }

      head.append(model, right);

      const meta = document.createElement("div");
      meta.className = "terminal-meta";

      function renderMeta(nextRow) {
        meta.replaceChildren();
        const metrics = [
          `Provider: ${nextRow.provider || "n/a"}`,
          `Solve Time: ${seconds(nextRow.solve_time_seconds)}`,
        ];
        for (const metric of metrics) {
          const chip = document.createElement("span");
          chip.className = "terminal-chip";
          chip.textContent = metric;
          meta.appendChild(chip);
        }
      }

      const pane = document.createElement("div");
      pane.className = "terminal-pane";

      const activity = createActivityController(row, pane, streamState);

      function update(nextRow) {
        status.className = `pill pill-${nextRow.status}`;
        status.textContent = String(nextRow.label || nextRow.status).replaceAll("_", " ");
        dot.className = `dot status-${nextRow.kind || "idle"}`;
        if (nextRow.color) dot.style.background = nextRow.color;
        name.textContent = nextRow.model;
        renderMeta(nextRow);
        syncRerunButton(nextRow);
        activity.update(nextRow);
      }

      renderMeta(row);
      syncRerunButton(row);
      card.append(head, meta, pane);

      return {
        card,
        update,
        destroy() {
          activity.destroy();
        },
      };
    }

    function renderChallengeTerminals(data) {
      const grid = document.getElementById("terminal-grid");
      grid.hidden = false;

      if (!data.models.length) {
        for (const controller of terminalControllers.values()) {
          controller.destroy();
        }
        terminalControllers.clear();
        grid.replaceChildren();
        const empty = document.createElement("p");
        empty.className = "message";
        empty.textContent = "No model runs found for this challenge.";
        grid.appendChild(empty);
        return;
      }

      const emptyState = grid.querySelector(".message");
      if (emptyState) {
        emptyState.remove();
      }

      const nextKeys = new Set();
      for (const row of data.models) {
        const key = terminalKey(row);
        nextKeys.add(key);
        let controller = terminalControllers.get(key);
        if (!controller) {
          controller = createTerminalCard(row);
          terminalControllers.set(key, controller);
          grid.appendChild(controller.card);
        } else {
          controller.update(row);
          grid.appendChild(controller.card);
        }
      }

      for (const [key, controller] of terminalControllers.entries()) {
        if (nextKeys.has(key)) continue;
        controller.destroy();
        controller.card.remove();
        terminalControllers.delete(key);
      }
    }

    async function loadChallengeDetails() {
      const response = await fetch(challengeApiUrl, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Failed to fetch details");
      }
      const data = await response.json();
      document.getElementById("meta").replaceChildren();
      setText("title", data.challenge?.name || "Challenge");
      setText(
        "summary",
        `${data.ctf?.title || "CTF"} · ${data.challenge?.difficulty || "unknown"} · ${data.challenge?.category || "misc"}`
      );
      renderChallengeOverview(data);
      renderChallengeTerminals(data);
    }

    async function loadOverviewDetails() {
      const response = await fetch(detailsApiUrl);
      if (!response.ok) {
        throw new Error("Failed to fetch details");
      }
      const data = await response.json();
      renderCtfNav(data);
      const meta = document.getElementById("meta");
      meta.replaceChildren();

      if (!data.ctf) {
        setText("title", "No Active Week");
        setText("summary", data.summary);
        return;
      }

      setText("title", data.ctf.title);
      setText("summary", `${data.ctf.status} · ${data.ctf.ctfd_url}`);
      addMeta("Challenges", data.overview.challenge_count);
      addMeta("Model runs", data.overview.model_count);
      addMeta("Runs active", data.overview.running_count);
      addMeta("Sandbox", data.ctf.sandbox_digest.slice(-16));
    }

    async function loadHeaderNav() {
      const response = await fetch(detailsApiUrl, { cache: "no-store" });
      if (!response.ok) return;
      const data = await response.json();
      renderCtfNav(data);
    }

    if (challengeApiUrl) {
      loadHeaderNav().catch(() => {});
      loadChallengeDetails().catch((error) => {
        setText("summary", error.message);
      });
      setInterval(() => {
        loadChallengeDetails().catch(() => {});
      }, 5000);
    } else {
      loadOverviewDetails().catch((error) => {
        setText("summary", error.message);
      });
    }
  </script>
{% endblock %}
