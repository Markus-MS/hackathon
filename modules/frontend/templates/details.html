{% extends "frontend_base.html" %}

{% block title %}{{ app_name }} Details{% endblock %}

{% block content %}
  <section class="panel details-panel">
    <p class="eyebrow">Details</p>
    <h1 id="title">Details</h1>
    <p class="subtitle" id="summary">Loading active CTF metadata...</p>
    <div class="meta" id="meta"></div>
    <a class="details-link" href="{{ url_for('frontend.index') }}">Back Home</a>
  </section>
{% endblock %}

{% block scripts %}
  <script>
    function addMeta(label, value) {
      const meta = document.getElementById("meta");
      const card = document.createElement("div");
      card.className = "meta-card";
      card.textContent = `${label}: ${value}`;
      meta.appendChild(card);
    }

    async function loadDetails() {
      const response = await fetch("{{ url_for('frontend.api_details') }}");
      if (!response.ok) {
        throw new Error("Failed to fetch details");
      }
      const data = await response.json();
      const meta = document.getElementById("meta");
      meta.replaceChildren();

      if (!data.ctf) {
        document.getElementById("title").textContent = "No Active Week";
        document.getElementById("summary").textContent = data.summary;
        return;
      }

      document.getElementById("title").textContent = data.ctf.title;
      document.getElementById("summary").textContent = `${data.ctf.status} · ${data.ctf.ctfd_url}`;
      addMeta("Challenges", data.overview.challenge_count);
      addMeta("Model runs", data.overview.model_count);
      addMeta("Runs active", data.overview.running_count);
      addMeta("Sandbox", data.ctf.sandbox_digest.slice(-16));
    }

    loadDetails().catch((error) => {
      document.getElementById("summary").textContent = error.message;
    });
  </script>
{% endblock %}
