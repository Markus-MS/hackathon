<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlagFarm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #fdfdff;
      --bg-accent: #f7f9fc;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --text: #111318;
      --muted: #6d7480;
      --border: rgba(17, 19, 24, 0.08);
      --green: #34c759;
      --orange: #ff9f0a;
      --gray: #cfd4dc;
      --red: #ff453a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }

    main {
      width: min(1400px, 100%);
      margin: 0 auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 5px;
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      backdrop-filter: blur(22px);
      overflow: hidden;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      position: sticky;
      top: 0;
      z-index: 3;
      backdrop-filter: blur(14px);
    }

    .brand,
    .nav-links,
    .playing-now,
    .legend-item,
    .model-label,
    .score-line {
      display: inline-flex;
      align-items: center;
    }

    .brand {
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .brand-mark {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #111318, #636b75);
    }

    .nav-links {
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link,
    .playing-now {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      font-size: 0.84rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .playing-now {
      gap: 8px;
      border: 1px solid rgba(52, 199, 89, 0.22);
      color: #15331d;
    }

    .flash-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.45);
      animation: pulse 1.6s infinite;
    }

    .hero {
      padding: 8px 14px 4px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.5vw, 2.1rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      max-width: 14ch;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 58rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .summary-tile,
    .leaderboard-card,
    .archive-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
    }

    .summary-tile {
      padding: 14px 16px;
    }

    .summary-tile span,
    .score-line,
    .archive-card small {
      color: var(--muted);
    }

    .summary-tile strong {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
    }

    .matrix-card,
    .leaderboard-section,
    .archive-section {
      margin: 6px 14px 10px;
    }

    .leaderboard-section,
    .archive-section {
      margin-top: 14px;
    }

    .matrix-card {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.74);
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1050px;
      border-collapse: collapse;
    }

    thead th {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      background: rgba(250, 250, 252, 0.9);
    }

    thead th:first-child,
    tbody th {
      position: sticky;
      left: 0;
      z-index: 1;
      text-align: left;
      background: rgba(255, 255, 255, 0.95);
    }

    tbody th,
    tbody td {
      padding: 10px 10px;
      border-bottom: 1px solid rgba(17, 19, 24, 0.06);
    }

    tbody th {
      min-width: 118px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    tbody tr:last-child th,
    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:nth-child(even) th,
    tbody tr:nth-child(even) td {
      background: rgba(17, 19, 24, 0.035);
    }

    tbody tr:nth-child(even) th {
      background: rgba(17, 19, 24, 0.045);
    }

    td {
      text-align: center;
    }

    .model-label {
      gap: 0;
    }

    .status-dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .status-solved {
      background: var(--green);
    }

    .status-trying {
      background: var(--orange);
    }

    .status-idle {
      background: var(--gray);
    }

    .status-error {
      background: var(--red);
    }

    .legend {
      display: flex;
      gap: 18px;
      padding: 0 14px 12px;
      color: var(--muted);
      font-size: 0.82rem;
      flex-wrap: wrap;
    }

    .legend-item {
      gap: 8px;
    }

    .message {
      padding: 12px 14px 14px;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: left;
    }

    .leaderboard-section,
    .archive-section {
      display: grid;
      gap: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
    }

    .section-head h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .leaderboard-grid,
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .leaderboard-card,
    .archive-card {
      padding: 15px 16px;
    }

    .leaderboard-card strong,
    .archive-card strong {
      display: block;
    }

    .score-line {
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    @keyframes pulse {
      0% {
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.45);
      }
      70% {
        opacity: 1;
        box-shadow: 0 0 0 10px rgba(52, 199, 89, 0);
      }
      100% {
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(52, 199, 89, 0);
      }
    }

    @media (max-width: 860px) {
      body {
        padding: 8px;
      }

      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-links {
        justify-content: flex-start;
      }

      .hero {
        padding: 6px 10px 2px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .matrix-card,
      .leaderboard-section,
      .archive-section {
        margin: 6px 10px 10px;
      }

      .legend,
      .message {
        padding-left: 10px;
        padding-right: 10px;
      }
    }

    @media (max-width: 560px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 2.15rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <nav class="nav">
        <a class="brand" href="/">
          <span class="brand-mark"></span>
          <span>FlagFarm</span>
        </a>
        <div class="nav-links">
          <div class="playing-now">
            <span class="flash-dot"></span>
            <span id="status-text">Loading current event...</span>
          </div>
          <a class="nav-link" id="admin-link" href="/admin/">Admin</a>
        </div>
      </nav>

      <header class="hero">
        <p class="eyebrow" id="eyebrow">Weekly CTF</p>
        <h1 id="ctf-title">FlagFarm</h1>
        <p class="subtitle" id="ctf-copy">Loading live run data...</p>
        <div class="summary-grid">
          <div class="summary-tile">
            <span>Challenges</span>
            <strong id="stat-challenges">0</strong>
          </div>
          <div class="summary-tile">
            <span>Model Runs</span>
            <strong id="stat-models">0</strong>
          </div>
          <div class="summary-tile">
            <span>Solved Cells</span>
            <strong id="stat-solved">0/0</strong>
          </div>
          <div class="summary-tile">
            <span>Runs Active</span>
            <strong id="stat-running">0</strong>
          </div>
        </div>
      </header>

      <section class="matrix-card">
        <table>
          <thead>
            <tr id="matrix-head">
              <th>Model</th>
            </tr>
          </thead>
          <tbody id="matrix-body">
            <tr>
              <td colspan="11" class="message">Loading challenges...</td>
            </tr>
          </tbody>
        </table>
      </section>

      <div class="legend">
        <span class="legend-item"><span class="status-dot status-solved"></span> Solved</span>
        <span class="legend-item"><span class="status-dot status-trying"></span> Trying</span>
        <span class="legend-item"><span class="status-dot status-idle"></span> Idle</span>
        <span class="legend-item"><span class="status-dot status-error"></span> Error</span>
      </div>

      <section class="leaderboard-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Leaderboard</p>
            <h2>Weighted score</h2>
          </div>
        </div>
        <div class="leaderboard-grid" id="leaderboard-grid"></div>
      </section>

      <section class="archive-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Archive</p>
            <h2>Recent weeks</h2>
          </div>
        </div>
        <div class="archive-grid" id="archive-grid"></div>
      </section>
    </section>
  </main>
  <script>
    const dashboardApiUrl = {{ dashboard_api_url|tojson }};

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function appendText(parent, text) {
      parent.appendChild(document.createTextNode(text));
    }

    function money(value) {
      return `$${Number(value || 0).toFixed(4)}`;
    }

    function renderHeader(data) {
      setText("status-text", data.status_text);
      document.getElementById("admin-link").href = data.admin_url;

      if (!data.ctf) {
        setText("eyebrow", "No Active Week");
        setText("ctf-title", "FlagFarm is waiting.");
        setText("ctf-copy", "Create a week in Admin, sync challenges from CTFd, attach model accounts, and start the run.");
      } else {
        setText("eyebrow", data.ctf.status);
        setText("ctf-title", data.ctf.title);
        setText(
          "ctf-copy",
          `${data.ctf.ctfd_url} · budget ${Number(data.ctf.budget_usd).toFixed(2)} USD per challenge · sandbox ${data.ctf.sandbox_digest.slice(-16)}`
        );
      }

      setText("stat-challenges", data.overview.challenge_count);
      setText("stat-models", data.overview.model_count);
      setText("stat-solved", `${data.matrix.solved_cells}/${data.matrix.total_cells}`);
      setText("stat-running", data.overview.running_count);
    }

    function renderMatrix(data) {
      const headRow = document.getElementById("matrix-head");
      const body = document.getElementById("matrix-body");
      headRow.replaceChildren();
      body.replaceChildren();

      const modelHead = document.createElement("th");
      modelHead.textContent = "Model";
      headRow.appendChild(modelHead);

      for (const challenge of data.challenges) {
        const th = document.createElement("th");
        th.textContent = challenge.name;
        th.title = `${challenge.category} · ${challenge.points} pts · ${challenge.difficulty}`;
        headRow.appendChild(th);
      }

      if (!data.challenges.length || !data.models.length) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = Math.max(2, data.challenges.length + 1);
        cell.className = "message";
        cell.textContent = "Sync challenges and start a competition to populate the matrix.";
        row.appendChild(cell);
        body.appendChild(row);
        return;
      }

      for (const model of data.models) {
        const row = document.createElement("tr");
        const label = document.createElement("th");
        label.scope = "row";

        const labelWrap = document.createElement("span");
        labelWrap.className = "model-label";
        const name = document.createElement("strong");
        name.textContent = model.name;
        labelWrap.append(name);
        label.appendChild(labelWrap);
        row.appendChild(label);

        for (const cellData of model.cells) {
          const cell = document.createElement("td");
          const dot = document.createElement("span");
          dot.className = `status-dot status-${cellData.kind}`;
          dot.title = `${cellData.challenge}: ${cellData.label} · ${money(cellData.cost_usd)}`;
          cell.appendChild(dot);
          row.appendChild(cell);
        }

        body.appendChild(row);
      }
    }

    function renderLeaderboard(rows) {
      const grid = document.getElementById("leaderboard-grid");
      grid.replaceChildren();

      if (!rows.length) {
        const message = document.createElement("p");
        message.className = "message";
        message.textContent = "No model runs have been scored yet.";
        grid.appendChild(message);
        return;
      }

      for (const row of rows) {
        const card = document.createElement("article");
        card.className = "leaderboard-card";

        const title = document.createElement("strong");
        title.textContent = `#${row.rank} ${row.model}`;
        const score = document.createElement("div");
        score.className = "score-line";
        appendText(score, `${row.score} pts`);
        const solves = document.createElement("span");
        solves.textContent = `${row.solves}/${row.attempted} solves`;
        score.appendChild(solves);

        const cost = document.createElement("div");
        cost.className = "score-line";
        appendText(cost, money(row.total_usd));
        const provider = document.createElement("span");
        provider.textContent = row.provider;
        cost.appendChild(provider);

        card.append(title, score, cost);
        grid.appendChild(card);
      }
    }

    function renderArchive(items) {
      const grid = document.getElementById("archive-grid");
      grid.replaceChildren();

      if (!items.length) {
        const message = document.createElement("p");
        message.className = "message";
        message.textContent = "No archived CTFs yet.";
        grid.appendChild(message);
        return;
      }

      for (const item of items) {
        const link = document.createElement("a");
        link.className = "archive-card";
        link.href = item.url;

        const title = document.createElement("strong");
        title.textContent = item.title;
        const meta = document.createElement("small");
        meta.textContent = `${item.status} · ${item.challenge_count} challenges · ${item.run_count} runs`;

        link.append(title, meta);
        grid.appendChild(link);
      }
    }

    async function loadDashboard() {
      const response = await fetch(dashboardApiUrl);
      if (!response.ok) {
        throw new Error("Failed to fetch dashboard data");
      }

      const data = await response.json();
      renderHeader(data);
      renderMatrix(data);
      renderLeaderboard(data.leaderboard);
      renderArchive(data.recent_ctfs);
    }

    loadDashboard().catch((error) => {
      const body = document.getElementById("matrix-body");
      body.innerHTML = "";
      const row = document.createElement("tr");
      const cell = document.createElement("td");
      cell.colSpan = 11;
      cell.className = "message";
      cell.textContent = error.message;
      row.appendChild(cell);
      body.appendChild(row);
    });
  </script>
</body>
</html>
