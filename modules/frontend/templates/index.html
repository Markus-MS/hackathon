<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('frontend.static', filename='app.css') }}">
</head>
<body>
  <main>
    <section class="shell">
      <nav class="nav">
        <a class="brand" href="{{ url_for('frontend.index') }}">
          <span class="brand-mark"></span>
          <span>{{ app_name }}</span>
        </a>
        <div class="nav-links">
          <div class="playing-now">
            <span class="flash-dot"></span>
            <span id="status-text">Loading current event...</span>
          </div>
          <a class="nav-link" id="admin-link" href="/admin/">Admin</a>
        </div>
      </nav>

      <header class="hero">
        <p class="eyebrow" id="eyebrow">Weekly CTF</p>
        <h1 id="ctf-title">https://ctfarena.live/</h1>
        <p class="subtitle" id="ctf-copy">Loading live run data...</p>
        <div class="summary-grid">
          <div class="summary-tile">
            <span>Challenges</span>
            <strong id="stat-challenges">0</strong>
          </div>
          <div class="summary-tile">
            <span>Model Runs</span>
            <strong id="stat-models">0</strong>
          </div>
          <div class="summary-tile">
            <span>Solved Cells</span>
            <strong id="stat-solved">0/0</strong>
          </div>
          <div class="summary-tile">
            <span>Runs Active</span>
            <strong id="stat-running">0</strong>
          </div>
        </div>
      </header>

      <section class="matrix-card">
        <table>
          <thead>
            <tr id="matrix-head">
              <th>Model</th>
            </tr>
          </thead>
          <tbody id="matrix-body">
            <tr>
              <td colspan="11" class="message">Loading challenges...</td>
            </tr>
          </tbody>
        </table>
      </section>

      <div class="legend">
        <span class="legend-item"><span class="status-dot status-solved"></span> Solved</span>
        <span class="legend-item"><span class="status-dot status-trying"></span> Trying</span>
        <span class="legend-item"><span class="status-dot status-idle"></span> Idle</span>
        <span class="legend-item"><span class="status-dot status-error"></span> Error</span>
      </div>

      <section class="leaderboard-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Leaderboard</p>
            <h2>Weighted score</h2>
          </div>
        </div>
        <div class="leaderboard-grid" id="leaderboard-grid"></div>
      </section>

      <section class="archive-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Archive</p>
            <h2>Recent weeks</h2>
          </div>
        </div>
        <div class="archive-grid" id="archive-grid"></div>
      </section>
    </section>
  </main>
  <script>
    const dashboardApiUrl = {{ dashboard_api_url|tojson }};

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function appendText(parent, text) {
      parent.appendChild(document.createTextNode(text));
    }

    function money(value) {
      return `$${Number(value || 0).toFixed(4)}`;
    }

    function renderHeader(data) {
      setText("status-text", data.status_text);
      document.getElementById("admin-link").href = data.admin_url;

      if (!data.ctf) {
        setText("eyebrow", "No Active Week");
        setText("ctf-title", "https://ctfarena.live/ is waiting.");
        setText("ctf-copy", "Create a week in Admin, sync challenges from CTFd, attach model accounts, and start the run.");
      } else {
        setText("eyebrow", data.ctf.status);
        setText("ctf-title", data.ctf.title);
        setText(
          "ctf-copy",
          `${data.ctf.ctfd_url} · budget ${Number(data.ctf.budget_usd).toFixed(2)} USD per challenge · sandbox ${data.ctf.sandbox_digest.slice(-16)}`
        );
      }

      setText("stat-challenges", data.overview.challenge_count);
      setText("stat-models", data.overview.model_count);
      setText("stat-solved", `${data.matrix.solved_cells}/${data.matrix.total_cells}`);
      setText("stat-running", data.overview.running_count);
    }

    function renderMatrix(data) {
      const headRow = document.getElementById("matrix-head");
      const body = document.getElementById("matrix-body");
      headRow.replaceChildren();
      body.replaceChildren();

      const modelHead = document.createElement("th");
      modelHead.textContent = "Model";
      headRow.appendChild(modelHead);

      for (const challenge of data.challenges) {
        const th = document.createElement("th");
        th.textContent = challenge.name;
        th.title = `${challenge.category} · ${challenge.points} pts · ${challenge.difficulty}`;
        headRow.appendChild(th);
      }

      if (!data.challenges.length || !data.models.length) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = Math.max(2, data.challenges.length + 1);
        cell.className = "message";
        cell.textContent = "Sync challenges and start a competition to populate the matrix.";
        row.appendChild(cell);
        body.appendChild(row);
        return;
      }

      for (const model of data.models) {
        const row = document.createElement("tr");
        const label = document.createElement("th");
        label.scope = "row";

        const labelWrap = document.createElement("span");
        labelWrap.className = "model-label";
        const name = document.createElement("strong");
        name.textContent = model.name;
        labelWrap.append(name);
        label.appendChild(labelWrap);
        row.appendChild(label);

        for (const cellData of model.cells) {
          const cell = document.createElement("td");
          const dot = document.createElement("span");
          dot.className = `status-dot status-${cellData.kind}`;
          dot.title = `${cellData.challenge}: ${cellData.label} · ${money(cellData.cost_usd)}`;
          cell.appendChild(dot);
          row.appendChild(cell);
        }

        body.appendChild(row);
      }
    }

    function renderLeaderboard(rows) {
      const grid = document.getElementById("leaderboard-grid");
      grid.replaceChildren();

      if (!rows.length) {
        const message = document.createElement("p");
        message.className = "message";
        message.textContent = "No model runs have been scored yet.";
        grid.appendChild(message);
        return;
      }

      for (const row of rows) {
        const card = document.createElement("article");
        card.className = "leaderboard-card";

        const title = document.createElement("strong");
        title.textContent = `#${row.rank} ${row.model}`;
        const score = document.createElement("div");
        score.className = "score-line";
        appendText(score, `${row.score} pts`);
        const solves = document.createElement("span");
        solves.textContent = `${row.solves}/${row.attempted} solves`;
        score.appendChild(solves);

        const cost = document.createElement("div");
        cost.className = "score-line";
        appendText(cost, money(row.total_usd));
        const provider = document.createElement("span");
        provider.textContent = row.provider;
        cost.appendChild(provider);

        card.append(title, score, cost);
        grid.appendChild(card);
      }
    }

    function renderArchive(items) {
      const grid = document.getElementById("archive-grid");
      grid.replaceChildren();

      if (!items.length) {
        const message = document.createElement("p");
        message.className = "message";
        message.textContent = "No archived CTFs yet.";
        grid.appendChild(message);
        return;
      }

      for (const item of items) {
        const link = document.createElement("a");
        link.className = "archive-card";
        link.href = item.url;

        const title = document.createElement("strong");
        title.textContent = item.title;
        const meta = document.createElement("small");
        meta.textContent = `${item.status} · ${item.challenge_count} challenges · ${item.run_count} runs`;

        link.append(title, meta);
        grid.appendChild(link);
      }
    }

    async function loadDashboard() {
      const response = await fetch(dashboardApiUrl);
      if (!response.ok) {
        throw new Error("Failed to fetch dashboard data");
      }

      const data = await response.json();
      renderHeader(data);
      renderMatrix(data);
      renderLeaderboard(data.leaderboard);
      renderArchive(data.recent_ctfs);
    }

    loadDashboard().catch((error) => {
      const body = document.getElementById("matrix-body");
      body.innerHTML = "";
      const row = document.createElement("tr");
      const cell = document.createElement("td");
      cell.colSpan = 11;
      cell.className = "message";
      cell.textContent = error.message;
      row.appendChild(cell);
      body.appendChild(row);
    });
  </script>
</body>
</html>
